name: Surveillance concerts IDF

on:
  schedule:
    # Tous les jours a 07:00 UTC (~09:00 Paris en ete, 08:00 en hiver).
    # Pour 2-3 fois/semaine : "0 7 * * 1,3,5" (lundi/mercredi/vendredi).
    - cron: "0 7 * * *"
  workflow_dispatch: {}   # permet un lancement manuel depuis l'onglet Actions

permissions:
  contents: write          # necessaire pour recommiter seen.json

concurrency:
  group: concerts-scan     # evite deux runs simultanes
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dependances
        run: pip install -r requirements.txt

      - name: Scanner Bandsintown
        env:
          BANDSINTOWN_APP_ID: ${{ secrets.BANDSINTOWN_APP_ID }}
          NOTIFY_METHOD: ${{ secrets.NOTIFY_METHOD }}
          NTFY_URL: ${{ secrets.NTFY_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python monitor.py

      - name: Sauvegarder l'etat (seen.json)
        run: |
          git add seen.json
          if git diff --cached --quiet; then
            echo "Aucun changement d'etat."
          else
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "maj seen.json [skip ci]"
            git push
          fi
